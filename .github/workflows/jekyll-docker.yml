name: Jekyll site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build the site
      run: |
        docker run \
        --rm \
        -v ${{ github.workspace }}:/srv/jekyll \
        jekyll/builder:latest /bin/bash -c "jekyll build --future"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: github-pages
        path: ./_site
